<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Aurivon Capital</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .map-container {
            height: 450px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="p-6 bg-white border-b flex justify-between items-center sticky top-0 z-50">
        <div class="text-2xl font-black italic tracking-tighter text-slate-900">
            AURIVON <span class="text-blue-600">CAPITAL</span>
        </div>
        <div class="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-widest text-slate-500">
            <a href="index.html" class="hover:text-blue-600 transition">Home</a>
            <a href="course.html" class="hover:text-blue-600 transition">Course</a>
            <a href="recruitment.html" class="hover:text-blue-600 transition">Recruitment</a>
            <a href="contact.html" class="text-blue-600 transition border-b-2 border-blue-600 pb-1">Contact</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto py-12 px-6">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black uppercase tracking-tight text-slate-900">Find Us</h1>
            <p class="text-slate-500 mt-2 uppercase text-xs tracking-[0.2em] font-bold">Aurivon Capital Headquarters</p>
        </div>

        <div class="map-container mb-12">
            <iframe 
                width="100%" 
                height="100%" 
                style="border:0" 
                loading="lazy" 
                allowfullscreen 
                referrerpolicy="no-referrer-when-downgrade" 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3988.80932029704!2d103.83756857502758!3d1.3006451617415175!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31da199147551061%3A0x603f909540b6165!2s111%20Somerset!5e0!3m2!1sen!2ssg!4v1714120000000!5m2!1sen!2ssg">
            </iframe>
        </div>

        <div class="grid md:grid-cols-2 gap-8 border-t border-slate-200 pt-10">
            <div class="flex items-start space-x-4">
                <div class="bg-blue-600 text-white p-3 rounded-lg">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div>
                    <h3 class="font-bold text-lg uppercase tracking-tight">Our Office</h3>
                    <p class="text-slate-600 text-lg">111 Somerset Road</p>
                    <p class="text-slate-600 text-lg leading-tight">Singapore</p>
                </div>
            </div>

            <div class="flex items-start space-x-4">
                <div class="bg-blue-600 text-white p-3 rounded-lg">
                    <i class="fas fa-envelope"></i>
                </div>
                <div>
                    <h3 class="font-bold text-lg uppercase tracking-tight">Email Us</h3>
                    <p class="text-blue-600 font-bold text-lg">support@aurivoncapital.com</p>
                    <p class="text-slate-500 text-sm italic">Typical response: Under 24 hours</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 mt-20 bg-white border-t border-slate-200 text-center">
        <p class="text-xs text-slate-400 uppercase tracking-widest">© 2026 Aurivon Capital. All Rights Reserved.</p>
    </footer>

</body>
</html>
